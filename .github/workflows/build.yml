name: Build FileShare APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:      # 支持手动触发

env:
  GRADLE_VERSION: "8.4"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # 1. 检出 Android 项目源码
      # ==========================================
      - name: Checkout Android project
        uses: actions/checkout@v4

      # ==========================================
      # 2. 设置 Go 语言环境
      # ==========================================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # ==========================================
      # 3. 交叉编译 FileBrowser 为 Android ARM64
      # ==========================================
      - name: Cross-compile FileBrowser for Android ARM64
        run: |
          set -e
          echo "::group::📥 Cloning FileBrowser source"
          git clone --depth=1 https://github.com/filebrowser/filebrowser.git
          echo "::endgroup::"

          echo "::group::🔨 Cross-compiling (GOOS=linux GOARCH=arm64)"
          cd filebrowser
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w" -o filebrowser-arm64 .
          echo "::endgroup::"

          echo "::group::📦 Copying binary to Android assets & jniLibs"
          mkdir -p ../app/src/main/assets
          cp filebrowser-arm64 ../app/src/main/assets/
          ls -lh ../app/src/main/assets/filebrowser-arm64

          # 同时复制到 jniLibs 目录 —— Android 安装 APK 时
          # 会自动提取到可执行的 native lib 目录，绕过 noexec 限制
          mkdir -p ../app/src/main/jniLibs/arm64-v8a
          cp filebrowser-arm64 ../app/src/main/jniLibs/arm64-v8a/libfilebrowser.so
          ls -lh ../app/src/main/jniLibs/arm64-v8a/libfilebrowser.so
          file ../app/src/main/jniLibs/arm64-v8a/libfilebrowser.so
          echo "::endgroup::"

      # ==========================================
      # 4. 设置 Java 17
      # ==========================================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ==========================================
      # 5. 设置 Android SDK
      # ==========================================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ==========================================
      # 6. 设置 Gradle 并生成 Wrapper
      # ==========================================
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}

      # ==========================================
      # 7. 构建并签名 Release APK
      #    - 如果提供了签名 secrets，使用 release 签名
      #    - 否则回退到 Android debug 签名
      # ==========================================
      - name: Build & Sign Release APK
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ -n "$KEYSTORE_PATH" ]; then
            echo "🔑 Using release signing key"
            echo "$KEYSTORE_PATH" | base64 -d > /tmp/keystore.jks
            export KEYSTORE_PATH=/tmp/keystore.jks
          else
            echo "🔑 No release key found, using debug signing"
          fi
          ./gradlew assembleRelease

      # ==========================================
      # 8. 列出构建产物
      # ==========================================
      - name: List APK files
        run: |
          echo "=== 📱 APK Artifacts ==="
          find app/build/outputs -name "*.apk" -type f -exec ls -lh {} \;
          echo ""
          echo "=== 🔍 APK Info ==="
          for apk in $(find app/build/outputs -name "*.apk" -type f); do
            echo "File: $apk"
            unzip -l "$apk" | grep "filebrowser-arm64" && echo "  ✅ Binary found in APK" || echo "  ⚠️  Binary NOT in APK"
          done

      # ==========================================
      # 9. 上传 APK 为 Artifact
      # ==========================================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileShare-APK
          path: |
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

  # ==========================================
  # 可选：创建 GitHub Release（当打 tag 时）
  # ==========================================
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download APK from build
        uses: actions/download-artifact@v4
        with:
          name: FileShare-APK
          path: apk-download

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: apk-download/*.apk
          generate_release_notes: true
          make_latest: true